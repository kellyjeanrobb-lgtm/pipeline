<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f8fafc;padding:32px;-webkit-font-smoothing:antialiased}
.title{font-size:16px;font-weight:800;color:#1e293b;margin-bottom:6px}
.sub{font-size:12px;color:#64748b;margin-bottom:20px}
table{border-collapse:collapse;font-size:12px;width:auto}
thead tr{background:#1e293b}
thead th{padding:10px 14px;color:#fff;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;text-align:center}
thead th:first-child{text-align:left}
tbody tr:nth-child(even){background:#f8fafc}
tbody tr:nth-child(odd){background:#fff}
tbody tr.feb26{background:#eff6ff !important;font-weight:700}
tbody tr.feb26 td{font-weight:700}
td{padding:7px 14px;text-align:center;white-space:nowrap;color:#1e293b;border-bottom:1px solid #f1f5f9}
td:first-child{text-align:left;font-weight:700;color:#334155;min-width:80px}
td:nth-child(2),td:nth-child(3){color:#475569}
.cell{display:inline-block;min-width:36px;padding:3px 8px;border-radius:5px;font-weight:700;text-align:center}

</head>

// Color scale for runway months
function moColor(v) {
  if (v === null) return '';
  if (v <= 5)  return 'background:#fee2e2;color:#991b1b';  // red-ish
  if (v <= 7)  return 'background:#fef9c3;color:#713f12';  // light yellow
  if (v <= 9)  return 'background:#fde68a;color:#78350f';  // yellow
  if (v <= 11) return 'background:#bbf7d0;color:#14532d';  // light green
  if (v <= 14) return 'background:#86efac;color:#14532d';  // medium green
  if (v <= 17) return 'background:#4ade80;color:#14532d';  // green
  return             'background:#16a34a;color:#fff';       // dark green
}

// Softer scale for rolling columns
function rollColor(v) {
  if (v === null) return '';
  if (v <= 7)  return 'background:#fef9c3;color:#713f12';
  if (v <= 10) return 'background:#d1fae5;color:#065f46';
  if (v <= 13) return 'background:#6ee7b7;color:#065f46';
  return             'background:#059669;color:#fff';
}

const tbody = document.getElementById('tbody');
DATA.forEach(r => {
  const isFeb26 = r.m === 'Feb-26';
  const tr = document.createElement('tr');
  if (isFeb26) tr.className = 'feb26';

  const moStyle = moColor(r.mo);
  const r6Style = rollColor(r.r6);
  const r12Style = rollColor(r.r12);

  tr.innerHTML = `
    <td>${r.m}</td>
    <td>${r.pipe.toLocaleString()}</td>
    <td>${r.el}</td>
    <td><span class="cell" style="${moStyle}">${r.mo}</span></td>
    <td>${r.r6 !== null ? `<span class="cell" style="${r6Style}">${r.r6}</span>` : ''}</td>
    <td>${r.r12 !== null ? `<span class="cell" style="${r12Style}">${r.r12}</span>` : ''}</td>
  `;
  tbody.appendChild(tr);
});
